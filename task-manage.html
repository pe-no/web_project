<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>과제 페이지</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/task-manage.css" />
  </head>
  <body>
    <div class="web">
      <header>
        <div class="logo">
          <a href="index.html">
            <img src="img/logo.png" alt="브랜드 로고" />
          </a>
        </div>

        <ul class="menu">
          <li><a href="index.html">홈</a></li>
          <li><a href="task-manage.html">과제</a></li>
          <li><a href="calendar.html">캘린더</a></li>
          <li><a href="#">기록</a></li>
        </ul>

        <div class="right_area">
          <div class="search_area">
            <input 
              type="search"
              id="searchInput" 
              placeholder="과제 검색" />
          </div>
          <a href="task-register.html" class="create">등록</a>
        </div>
      </header>

      <main class="task_page">
        <section class="page_title">
          <h1>과제 관리</h1>
          <p>등록된 과제를 마감일, 진행 상태, 중요도 기준으로 확인하세요.</p>
        </section>

        <section class="task_filter">
          <button class="active" data-status="전체">전체</button>
          <button data-status="시작 전">시작 전</button>
          <button data-status="진행 중">진행 중</button>
          <button data-status="완료">완료</button>
        </section>

        <section class="task_list"></section>
        
      </main>
    </div>
    <!-- supabase 백엔드 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Javascript/supabase.js"></script>
    <script src="Javascript/task-manage.js"></script>
  </body>
</html>
