<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>과제 수정 페이지</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/task-register.css" />

    <link
      rel="stylesheet"
      href="https://code.jquery.com/ui/1.14.2/themes/base/jquery-ui.css"
    />
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.js"></script>
    <script>
      $(function () {
        $.datepicker.setDefaults({
          closeText: "닫기",
          currentText: "오늘",
          prevText: "이전 달",
          nextText: "다음 달",
          monthNames: [
            "1월","2월","3월","4월","5월","6월",
            "7월","8월","9월","10월","11월","12월"
          ],
          monthNamesShort: [
            "1월","2월","3월","4월","5월","6월",
            "7월","8월","9월","10월","11월","12월"
          ],
          dayNames: ["일","월","화","수","목","금","토"],
          dayNamesShort: ["일","월","화","수","목","금","토"],
          dayNamesMin: ["일","월","화","수","목","금","토"],
          weekHeader: "주",
          yearSuffix: "년"
        });

        $("#datepicker").datepicker({
          dateFormat: "yy-mm-dd",
          showButtonPanel: true
        });
      });
    </script>
  </head>
  <body>
    <div class="web">
      <header>
        <div class="logo">
          <a href="index.html">
            <img src="img/logo.png" alt="브랜드 로고" />
          </a>
        </div>

        <ul class="menu">
          <li><a href="index.html">홈</a></li>
          <li><a href="task-manage.html">과제</a></li>
          <li><a href="calendar.html">캘린더</a></li>
          <li><a href="#">기록</a></li>
        </ul>

        <div class="right_area">
          <div class="search_area">
            <input 
              type="search"
              id="searchInput" 
              placeholder="과제 검색" />
          </div>
          <a href="task-register.html" class="create">등록</a>
        </div>
      </header>

      <main class="register_page">
        <section class="page_title">
          <h1>과제 수정</h1>
          <p>등록된 과제 정보를 수정하세요.</p>
        </section>

        <form class="task_form" id="task_form">
          <div class="form_group">
            <label for="taskTitle">과제명</label>
            <input
              type="text"
              id="taskTitle"
              placeholder="예: 웹사이트 제작 과제"
            />
          </div>

          <div class="form_group">
            <label for="subjectName">과목명</label>
            <input
              type="text"
              id="subjectName"
              placeholder="예: 웹프로그래밍"
            />
          </div>

          <div class="form_row">
            <div class="form_group">
              <label for="deadline">마감일</label>
              <input type="text" id="datepicker" />
            </div>

            <div class="form_group">
              <label for="priority">중요도</label>
              <select id="priority">
                <option>높음</option>
                <option>보통</option>
                <option>낮음</option>
              </select>
            </div>

            <div class="form_group">
              <label for="type">유형</label>
              <select id="type">
                <option>개인 프로젝트</option>
                <option>팀 프로젝트</option>
              </select>
            </div>
          </div>

          <div class="form_group">
            <label for="status">진행 상태</label>
            <select id="status">
              <option>시작 전</option>
              <option>진행 중</option>
              <option>완료</option>
            </select>
          </div>

          <div class="form_group">
            <label for="memo">과제 설명</label>
            <textarea
              id="memo"
              placeholder="과제 내용을 입력하세요."
            ></textarea>
          </div>

          <div class="button_area">
            <button type="submit" class="submit_btn">수정 완료</button>
            <button></button>
            <a href="task-manage.html" class="cancel_btn">취소</a>
          </div>
        </form>
      </main>
    </div>
    <!-- supabase 백엔드 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Javascript/supabase.js"></script>
    <script src="Javascript/task-edit.js"></script>
  </body>
</html>
